name: White Swan A.R.T. Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run White Swan A.R.T. Test Suite
      run: |
        pytest test_white_swan_art.py -v --tb=short
    
    - name: Run Tornado Scenario
      run: |
        python white_swan_art.py
    
    - name: Verify Ledger Integrity
      run: |
        python -c "from governance_ledger import ForensicLedger; ok, reason = ForensicLedger.verify('art_tornado_ledger.json'); print(f'Ledger Integrity: {\"PASS\" if ok else \"FAIL\"} - {reason}'); exit(0 if ok else 1)"

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Run flake8
      run: flake8 white_swan_art.py governance_ledger.py test_white_swan_art.py --max-line-length=120 --ignore=E203,W503
      continue-on-error: true
    
    - name: Check code formatting with black
      run: black --check white_swan_art.py governance_ledger.py test_white_swan_art.py --line-length=120
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit
    
    - name: Run security checks with bandit
      run: bandit -r . -ll --skip B101,B601 -f json -o bandit-report.json
      continue-on-error: true
